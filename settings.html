<div class="inline-drawer">
    <div class="inline-drawer-toggle inline-drawer-header">
        <b>WorldInfo Drawer</b>
        <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
    </div>
    <div class="inline-drawer-content">
        <div class="flex-container">
            <h4>Features</h4>
        </div>
        <div class="flex-container">
            <label class="menu_button" for="stwid-feature-folder-grouping">
                <input id="stwid-feature-folder-grouping" type="checkbox">
                Folder Grouping
            </label>
        </div>
        <div class="flex-container">
            <label class="menu_button" for="stwid-feature-additional-matching-sources">
                <input id="stwid-feature-additional-matching-sources" type="checkbox">
                Additional Matching Sources
            </label>
        </div>
        <div class="flex-container">
            <h4>Hide Tabs:</h4>
        </div>
        <div class="stwid--settingsCheckboxGrid">
            <div class="flex-container stwid--settingsCheckboxCell">
                <label class="menu_button" for="stwid-hidden-tab-settings">
                    <input id="stwid-hidden-tab-settings" type="checkbox">
                    Settings tab
                </label>
            </div>
            <div class="flex-container stwid--settingsCheckboxCell">
                <label class="menu_button" for="stwid-hidden-tab-lorebooks">
                    <input id="stwid-hidden-tab-lorebooks" type="checkbox">
                    Lorebooks tab
                </label>
            </div>
            <div class="flex-container stwid--settingsCheckboxCell">
                <label class="menu_button" for="stwid-hidden-tab-folders">
                    <input id="stwid-hidden-tab-folders" type="checkbox">
                    Folders tab
                </label>
            </div>
            <div class="flex-container stwid--settingsCheckboxCell">
                <label class="menu_button" for="stwid-hidden-tab-visibility">
                    <input id="stwid-hidden-tab-visibility" type="checkbox">
                    Visibility tab
                </label>
            </div>
            <div class="flex-container stwid--settingsCheckboxCell">
                <label class="menu_button" for="stwid-hidden-tab-sorting">
                    <input id="stwid-hidden-tab-sorting" type="checkbox">
                    Sorting tab
                </label>
            </div>
            <div class="flex-container stwid--settingsCheckboxCell">
                <label class="menu_button" for="stwid-hidden-tab-search">
                    <input id="stwid-hidden-tab-search" type="checkbox">
                    Search tab
                </label>
            </div>
        </div>
        <hr class="sysHR" />
    </div>
</div>
